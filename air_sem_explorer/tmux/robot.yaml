session_name: air_sem_explorer

# environment:

options:
  default-command: /bin/bash

environment:
  WS: $AIR_SEM_EXPLORER_WS

windows:
- window_name: drivers
  focus: true
  layout: tiled
  shell_command_before:
    - source ${WS}/install/setup.bash
    - export RMW_IMPLEMENTATION=rmw_zenoh_cpp
  panes:
    - shell_command:
      - cmd: ros2 launch driver_launch_pkg driver_launch.launch.py
        enter: true
    - shell_command:
      - cmd: ros2 service call /start_recording std_srvs/srv/Trigger
        enter: false

- window_name: tf
  focus: true
  layout: tiled
  shell_command_before:
    - source ${WS}/install/setup.bash
    - export RMW_IMPLEMENTATION=rmw_zenoh_cpp
  panes:
    - ros2 run rmw_zenoh_cpp rmw_zenohd
    - sleep 1; ros2 launch air_sem_explorer tf_handler_robot.launch.py
    - sleep 1; ros2 launch ugly_bridge ros2_bridge.launch.py

- window_name: Mapper
  focus: true
  layout: tiled
  shell_command_before:
    - source ${WS}/install/setup.bash
    - export RMW_IMPLEMENTATION=rmw_zenoh_cpp
  panes:
    - sleep 5; ros2 launch air_sem_explorer mapper_robot.launch.py
    - sleep 5; ros2 launch air_sem_gridmap sem_gridmap_robot.launch.py
    - sleep 5; ros2 launch vggt_mapper vggt_mapper_robot.launch.py

- window_name: Planner
  focus: true
  layout: tiled
  shell_command_before:
    - source ${WS}/install/setup.bash
    - export RMW_IMPLEMENTATION=rmw_zenoh_cpp
  panes:
    - sleep 5; ros2 launch air_sem_explorer planner_robot.launch.py

- window_name: Trigger
  focus: true
  layout: tiled
  shell_command_before:
    - source ${WS}/install/setup.bash
    - export RMW_IMPLEMENTATION=rmw_zenoh_cpp
  panes:
    - shell_command:
      - cmd: "ros2 topic pub -1 /state_machine/trigger std_msgs/Bool '{data: true}'"
        enter: false
    - shell_command:
      - cmd: "ros2 launch glider glider-node.launch.py"
        enter: false

- window_name: kill
  focus: false
  layout: tiled
  panes:
    - shell_command:
      - cmd: "tmux kill-session -t air_sem_explorer"
        enter: false
